  <!-- Fins -->
  <path d="M46 72 L36 88 L46 85 Z" fill="none" stroke="#a5b4fc" stroke-width="1.2" opacity="0.8"/>
  <path d="M74 72 L84 88 L74 85 Z" fill="none" stroke="#a5b4fc" stroke-width="1.2" opacity="0.8"/>
  <!-- Engine nozzle -->
  <ellipse cx="60" cy="91" rx="8" ry="3" fill="none" stroke="#818cf8" stroke-width="1"/>
  <!-- IFT-6 label -->
  <text x="60" y="108" text-anchor="middle" font-family="monospace" font-size="8" fill="#6366f1" letter-spacing="2" opacity="0.9">IFT-6</text>
  <!-- SPACEX label -->
  <text x="60" y="6" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#818cf8" letter-spacing="1.5" opacity="0.8">SPACEX</text>
  <!-- Exhaust glow -->
  <ellipse cx="60" cy="92" rx="6" ry="4" fill="#f97316" opacity="0.3"/>
  <ellipse cx="60" cy="93" rx="3" ry="2" fill="#fbbf24" opacity="0.4"/>
