<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#050514"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="60" cy="60" r="58" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="20" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="95" cy="18" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="30" cy="88" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="100" cy="82" r="1" fill="white" opacity="0.7"/>
  <circle cx="15" cy="60" r="0.7" fill="white" opacity="0.5"/>
  <circle cx="108" cy="45" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="50" cy="102" r="0.8" fill="white" opacity="0.5"/>
  <!-- Starship body -->
  <path d="M60 15 C54 15 48 30 46 50 L46 85 C46 88 53 92 60 92 C67 92 74 88 74 85 L74 50 C72 30 66 15 60 15 Z" 
        fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.9"/>
  <!-- Nose cone detail -->
  <path d="M57 15 L60 8 L63 15" fill="none" stroke="#818cf8" stroke-width="1.2"/>
  <!-- Body fill gradient -->
  <path d="M60 14 C55 14 50 28 48 48 L48 83 C48 87 54 91 60 91 C66 91 72 87 72 83 L72 48 C70 28 65 14 60 14 Z" 
